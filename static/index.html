<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Wave - Audio Enhancer</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%);
        }
        .studio-shadow {
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.04), 0 1px 3px rgba(0, 0, 0, 0.02);
        }
    </style>
</head>
<body class="text-slate-700 min-h-screen flex flex-col items-center justify-center p-6 font-sans">

    <div class="w-full max-w-lg bg-white/90 border border-slate-200/80 rounded-2xl p-8 studio-shadow backdrop-blur-md">
        
        <div class="text-center mb-8">
            <div class="inline-block text-[10px] font-bold tracking-widest text-blue-600 uppercase bg-blue-50 border border-blue-100 px-2.5 py-1 rounded-md mb-3">
                Studio Edition
            </div>
            <h1 class="text-2xl font-bold tracking-tight text-slate-900">
                STUDIO WAVE
            </h1>
            <p class="text-xs text-slate-400 mt-1.5">AIによる高音域復元 & ハイレゾ化</p>
        </div>

        <form id="uploadForm" class="space-y-6">
            <div class="group relative border border-dashed border-slate-300 hover:border-blue-500 rounded-xl p-8 text-center transition-all cursor-pointer bg-slate-50/50 hover:bg-blue-50/10">
                <input type="file" id="audioFile" accept="audio/*" class="absolute inset-0 opacity-0 cursor-pointer" required>
                
                <div class="space-y-2">
                    <div class="text-2xl text-slate-400 group-hover:text-blue-500 transition-colors">✨</div>
                    <p class="text-xs font-medium text-slate-600 group-hover:text-slate-900 transition-colors" id="fileName">
                        オーディオファイルを選択、またはドロップ
                    </p>
                    <p class="text-[10px] text-slate-400">MP3, WAV (最大60秒まで)</p>
                </div>
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-slate-900 hover:bg-slate-800 text-white font-medium py-3 px-4 rounded-xl transition-all active:scale-[0.99] cursor-pointer text-xs tracking-wider">
                オーディオを拡張する
            </button>
        </form>

        <div id="statusArea" class="hidden mt-6 p-4 rounded-xl bg-slate-50 border border-slate-100 text-center">
            <div id="loadingSpinner" class="inline-block w-4 h-4 border-2 border-blue-600 border-t-transparent rounded-full animate-spin mb-1.5"></div>
            <p id="statusText" class="text-[11px] font-medium text-slate-500">高音質化処理を執行中...</p>
        </div>

        <div id="resultArea" class="hidden mt-6 p-4 rounded-xl bg-blue-50/40 border border-blue-100 space-y-3">
            <p class="text-[11px] font-bold text-blue-600 text-center flex items-center justify-center gap-1">
                処理が完了しました
            </p>
            <div class="bg-white p-1.5 rounded-lg border border-slate-200 shadow-sm">
                <audio id="audioPlayer" controls class="w-full h-9"></audio>
            </div>
            <a id="downloadLink" href="#" class="block text-center text-xs font-medium bg-blue-600 hover:bg-blue-700 text-white py-2.5 px-4 rounded-lg transition-colors">
                24bit WAV をダウンロード
            </a>
        </div>

    </div>

    <script>
        const fileInput = document.getElementById('audioFile');
        const fileNameDisplay = document.getElementById('fileName');
        const uploadForm = document.getElementById('uploadForm');
        const submitBtn = document.getElementById('submitBtn');
        const statusArea = document.getElementById('statusArea');
        const resultArea = document.getElementById('resultArea');
        const audioPlayer = document.getElementById('audioPlayer');
        const downloadLink = document.getElementById('downloadLink');

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                fileNameDisplay.textContent = file.name;
                fileNameDisplay.classList.add('text-blue-600', 'font-semibold');
            }
        });

        uploadForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const file = fileInput.files[0];
            if (!file) return;

            const formData = new FormData();
            formData.append('file', file);

            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-40', 'cursor-not-allowed');
            statusArea.classList.remove('hidden');
            resultArea.classList.add('hidden');

            try {
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) throw new Error('サーバーでエラーが発生しました。ファイルが長すぎるか、メモリ制限に達した可能性があります。');

                const blob = await response.blob();
                const audioUrl = URL.createObjectURL(blob);

                audioPlayer.src = audioUrl;
                downloadLink.href = audioUrl;
                downloadLink.download = file.name.replace(/\.[^/.]+$/, "") + "_studio.wav";

                resultArea.classList.remove('hidden');
            } catch (error) {
                alert(error.message);
            } finally {
                submitBtn.disabled = false;
                submitBtn.classList.remove('opacity-40', 'cursor-not-allowed');
                statusArea.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
