<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextGen Audio Enhancer Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body { background: radial-gradient(circle at center, #1a1c23 0%, #0f1015 100%); }
        .neon-glow { box-shadow: 0 0 20px rgba(6, 182, 212, 0.15); }
    </style>
</head>
<body class="text-slate-200 min-h-screen flex flex-col items-center justify-center p-6 font-sans">

    <div class="w-full max-w-md bg-slate-900/80 border border-slate-800 rounded-2xl p-8 neon-glow backdrop-blur-xl relative">
        
        <div class="text-center mb-8">
            <div class="inline-block text-xs font-bold tracking-widest text-cyan-400 uppercase bg-cyan-950/50 border border-cyan-800/50 px-3 py-1 rounded-full mb-3">
                AI Audio Studio v2
            </div>
            <h1 class="text-3xl font-black tracking-tight text-white bg-gradient-to-r from-white via-slate-200 to-cyan-400 bg-clip-text text-transparent">
                NEXTGEN PROCESSOR
            </h1>
        </div>

        <form id="uploadForm" class="space-y-6">
            <div class="relative border-2 border-dashed border-slate-700 hover:border-cyan-500 rounded-xl p-8 text-center transition-all cursor-pointer bg-slate-950/40 group">
                <input type="file" id="audioFile" accept="audio/*" class="absolute inset-0 opacity-0 cursor-pointer" required>
                <div class="space-y-2">
                    <div class="text-3xl text-slate-500 group-hover:text-cyan-400 transition-colors">🎵</div>
                    <p class="text-sm font-medium text-slate-300" id="fileName">オーディオファイルを選択</p>
                </div>
            </div>
            <button type="submit" id="submitBtn" class="w-full bg-cyan-500 hover:bg-cyan-400 text-slate-950 font-bold py-3.5 px-4 rounded-xl transition-all cursor-pointer text-sm tracking-wider">
                PROCESS AUDIO
            </button>
        </form>

        <div id="statusArea" class="hidden mt-6 p-4 rounded-xl bg-slate-950/60 border border-slate-800 text-center">
            <div class="inline-block w-5 h-5 border-2 border-cyan-500 border-t-transparent rounded-full animate-spin mb-2"></div>
            <p class="text-xs font-mono text-cyan-400">ANALYZING & ENHANCING...</p>
        </div>

        <div id="resultArea" class="hidden mt-6 space-y-4">
            
            <p class="text-xs font-bold text-center text-slate-400" id="playingName">File Ready</p>

            <div class="flex items-center justify-between bg-slate-950 p-3 rounded-xl border border-slate-800">
                <div class="flex items-center gap-3">
                    <button id="origPlayBtn" class="w-10 h-10 flex items-center justify-center bg-slate-800 hover:bg-slate-700 text-white rounded-full font-bold transition-all cursor-pointer">
                        ▶
                    </button>
                    <div>
                        <p class="text-xs font-bold text-slate-300">BEFORE</p>
                        <p class="text-[10px] text-slate-500">Original Audio (Bypass)</p>
                    </div>
                </div>
            </div>

            <div class="flex items-center justify-between bg-slate-950 p-3 rounded-xl border border-cyan-950/50 relative">
                <div class="flex items-center gap-3">
                    <button id="enhPlayBtn" class="w-10 h-10 flex items-center justify-center bg-cyan-500 hover:bg-cyan-400 text-slate-950 rounded-full font-bold transition-all cursor-pointer">
                        ▶
                    </button>
                    <div>
                        <p class="text-xs font-bold text-white">AFTER</p>
                        <p class="text-[10px] text-cyan-400 font-mono">Enhanced (96kHz / 24bit)</p>
                    </div>
                </div>

                <div class="relative">
                    <button id="menuBtn" class="w-8 h-8 flex items-center justify-center text-slate-400 hover:text-white rounded-full hover:bg-slate-800 text-lg font-bold transition-colors cursor-pointer">
                        ⋮
                    </button>
                    <div id="dropdownMenu" class="hidden absolute right-0 bottom-10 w-44 bg-slate-900 border border-slate-700 rounded-lg shadow-2xl py-1 z-50 text-xs">
                        <a id="downloadEnhanced" href="#" class="block px-4 py-2.5 hover:bg-cyan-500 hover:text-slate-950 transition-colors font-medium">
                            📥 ハイレゾ版を保存
                        </a>
                        <a id="downloadOriginal" href="#" class="block px-4 py-2.5 hover:bg-slate-800 transition-colors text-slate-400">
                            📥 元の音源を保存
                        </a>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        // 2つの独立したプレイヤー
        let origAudio = new Audio();
        let enhAudio = new Audio();

        const fileInput = document.getElementById('audioFile');
        const fileNameDisplay = document.getElementById('fileName');
        const uploadForm = document.getElementById('uploadForm');
        const submitBtn = document.getElementById('submitBtn');
        const statusArea = document.getElementById('statusArea');
        const resultArea = document.getElementById('resultArea');
        
        const origPlayBtn = document.getElementById('origPlayBtn');
        const enhPlayBtn = document.getElementById('enhPlayBtn');
        
        const menuBtn = document.getElementById('menuBtn');
        const dropdownMenu = document.getElementById('dropdownMenu');
        const downloadEnhanced = document.getElementById('downloadEnhanced');
        const downloadOriginal = document.getElementById('downloadOriginal');

        fileInput.addEventListener('change', (e) => {
            if(e.target.files[0]) fileNameDisplay.textContent = e.target.files[0].name;
        });

        // 3点リーダーの開閉
        menuBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            dropdownMenu.classList.toggle('hidden');
        });
        document.addEventListener('click', () => dropdownMenu.classList.add('hidden'));

        // フォーム送信（変換）
        uploadForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const file = fileInput.files[0];
            if (!file) return;

            const formData = new FormData();
            formData.append('file', file);

            submitBtn.disabled = true;
            statusArea.classList.remove('hidden');
            resultArea.classList.add('hidden');

            // 前の再生を止める
            origAudio.pause(); origAudio.currentTime = 0;
            enhAudio.pause();  enhAudio.currentTime = 0;
            origPlayBtn.textContent = '▶';
            enhPlayBtn.textContent = '▶';

            try {
                const response = await fetch('/upload', { method: 'POST', body: formData });
                if (!response.ok) throw new Error('変換に失敗しました。');

                const blob = await response.blob();
                const zip = await JSZip.loadAsync(blob);
                
                let origBlob, enhBlob;
                for (let filename in zip.files) {
                    if (filename.includes('_original.wav')) {
                        origBlob = await zip.files[filename].async("blob");
                    } else if (filename.includes('_enhanced.wav')) {
                        enhBlob = await zip.files[filename].async("blob");
                    }
                }

                const origUrl = URL.createObjectURL(origBlob);
                const enhUrl = URL.createObjectURL(enhBlob);

                origAudio.src = origUrl;
                enhAudio.src = enhUrl;

                // ダウンロードリンク設定
                downloadOriginal.href = origUrl;
                downloadOriginal.download = file.name.replace(/\.[^/.]+$/, "") + "_original.wav";
                downloadEnhanced.href = enhUrl;
                downloadEnhanced.download = file.name.replace(/\.[^/.]+$/, "") + "_enhanced.wav";

                document.getElementById('playingName').textContent = file.name;
                resultArea.classList.remove('hidden');

            } catch (error) {
                alert(error.message);
            } finally {
                submitBtn.disabled = false;
                statusArea.classList.add('hidden');
            }
        });

        // 🎵 Beforeプレイヤーのボタン処理
        origPlayBtn.addEventListener('click', () => {
            // Afterが再生中なら止める
            if (!enhAudio.paused) {
                enhAudio.pause();
                enhPlayBtn.textContent = '▶';
            }

            if (origAudio.paused) {
                origAudio.play();
                origPlayBtn.textContent = '⏸';
                origPlayBtn.classList.add('bg-slate-700');
            } else {
                origAudio.pause();
                origPlayBtn.textContent = '▶';
                origPlayBtn.classList.remove('bg-slate-700');
            }
        });

        // 🚀 Afterプレイヤーのボタン処理
        enhPlayBtn.addEventListener('click', () => {
            // Beforeが再生中なら止める
            if (!origAudio.paused) {
                origAudio.pause();
                origPlayBtn.textContent = '▶';
                origPlayBtn.classList.remove('bg-slate-700');
            }

            if (enhAudio.paused) {
                enhAudio.play();
                enhPlayBtn.textContent = '⏸';
                enhPlayBtn.classList.replace('bg-cyan-500', 'bg-cyan-600');
            } else {
                enhAudio.pause();
                enhPlayBtn.textContent = '▶';
                enhPlayBtn.classList.replace('bg-cyan-600', 'bg-cyan-500');
            }
        });

        // 再生が最後まで終わったらボタンを元に戻す設定
        origAudio.addEventListener('ended', () => { origPlayBtn.textContent = '▶'; origPlayBtn.classList.remove('bg-slate-700'); });
        enhAudio.addEventListener('ended', () => { enhPlayBtn.textContent = '▶'; enhPlayBtn.classList.replace('bg-cyan-600', 'bg-cyan-500'); });

    </script>
</body>
</html>
